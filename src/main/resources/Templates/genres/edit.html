<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Редагувати жанр</title>
</head>
<body layout:fragment="content">
<div class="flex justify-center">
    <div class="w-full max-w-md bg-white shadow-lg rounded-lg p-6 mt-8">
        <h1 class="text-2xl text-center font-bold mb-6 text-gray-800">Редагувати жанр</h1>
        <form th:action="@{/genres/edit/{id}(id=${genre.id})}" th:object="${genre}" method="post" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Назва</label>
                <input type="text" th:field="*{name}" required
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-1">Опис</label>
                <textarea th:field="*{description}"
                          class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div class="flex justify-center">
                <button type="submit"
                        class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                    Оновити
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
