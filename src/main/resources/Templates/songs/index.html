<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Пісні</title>
</head>
<body>
<div layout:fragment="content">
    <h1 class="text-3xl font-bold mb-4 text-gray-900 text-center">
        Список пісень
    </h1>
    <div th:if="${#lists.isEmpty(songsPage.content)}">
        <p class="text-gray-500">Пісні відсутні</p>
    </div>
    <div th:if="${!#lists.isEmpty(songsPage.content)}" class="space-y-4">
        <div th:each="song : ${songsPage.content}" class="border border-gray-300 rounded-lg p-4 bg-white shadow-sm hover:shadow-md transition">
            <h2 class="text-xl font-bold text-gray-900" th:text="${song.name}"></h2>
            <p class="text-gray-700">
                <span class="font-semibold">Виконавець:</span>
                <span th:text="${song.artist}"></span>
            </p>
            <p class="text-gray-700">
                <span class="font-semibold">Альбом:</span>
                <span th:text="${song.album}"></span>
            </p>

            <p class="text-gray-700">
                <span class="font-semibold">Жанри:</span>
                <span th:each="genre : ${song.genres}"
                        th:text="${genre}"
                        class="inline-block bg-gray-200 rounded px-2 py-1 mr-1 text-sm text-gray-800">
                </span>
            </p>

            <div class="mt-3">
                <audio class="audio-player" controls>
                    <source th:src="@{'/mp3songs/' + ${song.fileName}}" type="audio/mpeg">
                    Ваш браузер не підтримує аудіо.
                </audio>
            </div>
        </div>
    </div>
    <div class="flex justify-center gap-4 mt-6">
        <a th:if="${songsPage.hasPrevious()}"
            th:href="@{/songs(page=${songsPage.number - 1})}"
            class="px-3 py-1 bg-green-600 text-white rounded">Назад</a>

        <span>Сторінка <span th:text="${songsPage.number + 1}"></span> з <span th:text="${songsPage.totalPages}"></span></span>

        <a th:if="${songsPage.hasNext()}"
            th:href="@{/songs(page=${songsPage.number + 1})}"
            class="px-3 py-1 bg-green-600 text-white rounded">Вперед</a>
    </div>
    <script>
       const players = document.querySelectorAll('.audio-player');

        players.forEach((player, index) => {
            player.addEventListener('play', () => {
                players.forEach(other => {
                    if (other !== player) {
                        other.pause();
                        other.currentTime = 0;
                    }
                });
            });
            player.addEventListener('ended', () => {
                const next = players[index + 1];
                if (next) {
                    next.play();
                }
            });
        });
    </script>
</div>
</body>
</html>
