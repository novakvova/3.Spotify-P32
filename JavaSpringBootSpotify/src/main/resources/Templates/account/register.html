<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Реєстрація</title>
</head>
<body>
<div layout:fragment="content" class="relative flex flex-col items-center justify-center w-full mt-10">
    <div class="bg-white/70 backdrop-blur-md rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-green-700 mb-6">Реєстрація</h1>

        <form class="space-y-5" th:action="@{/register}" th:object="${registerDto}" method="post" enctype="multipart/form-data">

            <div>
                <label for="username" class="block text-green-800 font-medium mb-1">Ім’я користувача</label>
                <input id="username" th:field="*{username}" type="text" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div>
                <label for="email" class="block text-green-800 font-medium mb-1">Email</label>
                <input id="email" th:field="*{email}" type="email" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div>
                <label for="password" class="block text-green-800 font-medium mb-1">Пароль</label>
                <input id="password" th:field="*{password}" type="password" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div>
                <label for="confirmPassword" class="block text-green-800 font-medium mb-1">Підтвердження пароля</label>
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div class="flex flex-col items-center">
                <label for="image" class="relative w-32 h-32 rounded-full overflow-hidden cursor-pointer group">
                    <!-- прев’ю фото -->
                    <img id="preview" src="/images/default-avatar.png"
                        class="w-full h-full object-cover rounded-full border border-green-300">

                    <!-- чорний шар при наведенні -->
                    <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <span class="text-white font-semibold">Вибрати інше</span>
                    </div>
                </label>
                <input id="image" name="image" type="file" accept="image/*" class="hidden" onchange="previewImage(event)">
            </div>

            <button type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700">
                Зареєструватися
            </button>
        </form>

        <div class="text-center mt-4 text-green-700 font-medium">
            <p th:if="${error}" th:text="${error}" class="text-red-600"></p>

            <p class="mt-4">
                Вже маєте акаунт?
                <a th:href="@{/login}" class="text-green-700 font-semibold hover:underline">Увійти</a>
            </p>
        </div>
    </div>
    <script>
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</div>
</body>
</html>
