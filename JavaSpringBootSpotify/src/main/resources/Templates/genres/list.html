<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Жанри</title>
</head>
<body layout:fragment="content">
<h1 class="text-3xl text-center font-bold mb-4 text-gray-800">Список жанрів</h1>

<div class="flex justify-center mb-6">
    <a th:href="@{/genres/create}"
       class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
        Додати жанр
    </a>
</div>

<div class="flex justify-center">
    <div class="w-full max-w-4xl">
        <table class="w-full border border-gray-300 rounded-lg shadow-md bg-white">
            <thead class="bg-green-100">
            <tr>
                <th class="px-4 py-2 text-left">ID</th>
                <th class="px-4 py-2 text-left">Назва</th>
                <th class="px-4 py-2 text-left">Опис</th>
                <th class="px-4 py-2 text-left">Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="genre : ${genres}" class="border-t hover:bg-green-50">
                <td class="px-4 py-2" th:text="${genre.id}"></td>
                <td class="px-4 py-2 font-semibold text-gray-700" th:text="${genre.name}"></td>
                <td class="px-4 py-2 text-gray-600" th:text="${genre.description}"></td>
                <td class="px-4 py-2 flex gap-2">
                    <a th:href="@{/genres/edit/{id}(id=${genre.id})}"
                       class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition">
                        Редагувати
                    </a>
                    <a th:href="@{/genres/delete/{id}(id=${genre.id})}"
                       class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 transition">
                        Видалити
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
